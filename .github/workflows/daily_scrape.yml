name: Daily PSPCL Data Scrape

on:
  schedule:
    # Runs automatically at 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * *'
  workflow_dispatch: # Allows manual trigger from your Streamlit dashboard

jobs:
  api_fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Fetch API Data
        run: python api_fetcher.py

      - name: Archive, Commit and Push New CSVs
        run: |
          # 1. Create archive directory and copy files
          mkdir -p archive
          cp *_Outages_*.csv *_PTW_*.csv archive/ || true
          
          # 2. Configure Git bot identity
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 3. Stage the new CSVs
          git add *_Outages_*.csv *_PTW_*.csv archive/*
          
          # 4. Commit (will exit gracefully if no new data was fetched)
          git commit -m "Automated daily API data update" || echo "No changes to commit"
          
          # 5. Pull any manual code updates to prevent push rejections
          git pull --rebase origin main
          
          # 6. Push back to your repository
          git push
